<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Divvy — an idea cloud that grows itself</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>generating idea cloud…</p>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="mark">◍</span>
      <h1>Divvy</h1>
      <span class="tagline">an idea cloud that grows itself</span>
    </div>
    <div class="meta">
      <span id="idea-count">—</span> ideas
      <span class="sep">·</span>
      last scan <span id="last-scan">—</span>
    </div>
  </header>

  <div id="controls" class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" class="search" type="search" placeholder="Search ideas, hooks, tags…" autocomplete="off" />
    </div>
    <button id="tags-btn" class="tags-btn" aria-expanded="false">Tags <span class="caret">▾</span></button>
    <button id="random-btn" class="random-btn" title="open a random idea">🎲 Random</button>
    <div id="tag-pop" class="tag-pop"></div>
  </div>

  <main id="stage">
    <svg id="cloud" aria-label="idea cloud"></svg>
    <p id="empty" hidden>No ideas yet. Run the scanner to grow the cloud.</p>
    <div id="tooltip" class="tooltip" hidden></div>
    <div id="filterbar" class="filterbar" hidden></div>
    <div id="legend" class="legend" aria-label="colored by source"></div>
  </main>

  <!-- PRD slide-in panel -->
  <aside id="panel" class="panel" hidden aria-hidden="true">
    <button id="panel-close" class="panel-close" aria-label="close">✕</button>
    <div class="panel-head">
      <div id="panel-tags" class="tags"></div>
      <h2 id="panel-title"></h2>
      <p id="panel-hook" class="hook"></p>
    </div>
    <article id="panel-prd" class="prd"></article>
  </aside>
  <div id="scrim" class="scrim" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
