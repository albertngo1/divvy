name = "divvy"
compatibility_date = "2026-07-01"

# Static-assets Worker: `npm run build` -> dist/, then `npx wrangler deploy` uploads dist
# as static assets (no server code). Serves at divvy.<your-subdomain>.workers.dev.
# (If you'd rather use Cloudflare *Pages* for a divvy.pages.dev URL, delete the [assets]
# block, set `pages_build_output_dir = "dist"`, and deploy via the Pages product instead.)
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
