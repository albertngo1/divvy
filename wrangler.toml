name = "divvy"
compatibility_date = "2026-07-01"
# Cloudflare Pages project: build command "npm run build", output dir "dist".
pages_build_output_dir = "dist"

# Upvotes backend: D1 (serverless SQLite) bound to the Pages Functions as env.DB.
# Create it with `npx wrangler d1 create divvy`, paste the printed database_id below,
# then seed it: `npx wrangler d1 execute divvy --remote --file=db/schema.sql`.
[[d1_databases]]
binding = "DB"
database_name = "divvy"
database_id = "9b02171a-5849-4e7e-aaba-0b7d76a9098f"

# Realtime presence (live cursors + vote broadcasts). This binding is COMMENTED OUT until
# the divvy-realtime Worker is deployed — Pages fails the whole deploy if it references a
# Worker that doesn't exist yet. To enable live cursors:
#   1) cd realtime && npm install && npx wrangler deploy   (deploys divvy-realtime + PresenceRoom)
#   2) uncomment the block below and push (Pages rebinds ROOM on the next build)
# [[durable_objects.bindings]]
# name = "ROOM"
# class_name = "PresenceRoom"
# script_name = "divvy-realtime"
